<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Abdullah Essa | Contact</title>
        <meta name="description" content="Abdullah Essa - Final-year Computer Science student at Emeris Sandton. Portfolio showcasing projects in ASP.NET, SignalR, automation, and cybersecurity.">
        <link rel="stylesheet" href="CSS/styles.css">
    </head>

    <body>
        <nav>
            <div id="nav-placeholder"></div>
            <load src="nav.html" />
        </nav>

        <header class="relative mx-auto text-center md:text-center w-[95%] md:w-[75%] justify-center bg-transparent top-2">
            <h3 class="text-[24px] md:text-[40px] font-bold mb-2.5 text-primary font-boska">Want to Contact me?</h3>
            <h4 class="text-[18px] md:text-[2h-4px] text-border-custom font-satoshi">Fill in the form below and I'll get back to you as soon as possible!</h4>
        </header>

        <main class="mt-8">
            <section class="relative w-[95%] md:w-[75%] mx-auto mt-3.75 p-3.75 md:p-7.5 rounded-lg border-b border-border-custom text-left bg-transparent">
                <!-- Restored mx-auto to center the form wrapper, and added items-center to center the elements inside -->
                <form action="https://api.web3forms.com/submit" method="POST" class="flex flex-col items-center gap-3.75 w-full md:w-[15%] mx-auto text-left">
                    <input type="hidden" name="access_key" value="70626a07-af00-4425-93fe-3429bdb5735f">
                    <input type="hidden" name="redirect" value="https://aessa786.github.io/form-complete.html">

                    <!-- Name Field -->
                    <div class="flex flex-col w-full max-w-100">
                        <label for="name" class="text-primary font-satoshi mb-1 text-[14px]">Name:</label>
                        <input type="text" name="name" class="p-2.5 border border-border-custom rounded-[5px] bg-transparent text-primary text-[16px] w-50 focus:outline-none focus:border-accent transition-colors" required>
                    </div>
                    
                    <!-- Email Field -->
                    <div class="flex flex-col w-full max-w-100">
                        <label for="email" class="text-primary font-satoshi mb-1 text-[14px]">Email:</label>
                        <input type="email" name="email" class="p-2.5 border border-border-custom rounded-[5px] bg-transparent text-primary text-[16px] w-50 focus:outline-none focus:border-accent transition-colors" required>
                    </div>

                    <!-- Message Field -->
                    <div class="flex flex-col w-full max-w-100">
                        <label for="message" class="text-primary font-satoshi mb-1 text-[14px]">Message:</label>
                        <textarea name="message" class="p-2.5 border border-border-custom rounded-[5px] bg-transparent text-primary text-[16px] w-50 h-25 resize-none focus:outline-none focus:border-accent transition-colors" required></textarea>
                    </div>

                    <!-- Submit Button - Snaps perfectly in line with the inputs above it -->
                    <button type="submit" class="w-full max-w-25 py-2.5 px-4 text-black mt-2 border-0 rounded-[5px] bg-accent font-bold text-[16px] cursor-pointer transition-all hover:bg-[#85a805]">Submit</button>
                </form>
                <p class="text-[12px] text-border-custom text-center mt-5">Powered by Web3Forms — no data stored beyond delivery.</p>
            </section>
        </main>

        <footer>
            <load src="footer.html" />
        </footer>
    </body>

</html>
