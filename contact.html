<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="CSS/styles.css">
    </head>

    <body>
        <div id="nav-placeholder"></div>
        <script src="//code.jquery.com/jquery.min.js"></script>
        <script>
            $(function(){
            $("#nav-placeholder").load("../../nav.html");
            });
        </script>

        <header>
            <h3>Want to Contact me?</h3>
            <h4>Fill in the form below and I'll get back to you as soon as possible!</h4>
        </header>

        <main>
            <section>
                <form action="https://api.web3forms.com/submit" method="POST" id="contact-form">
                    <input type="hidden" name="access_key" value="70626a07-af00-4425-93fe-3429bdb5735f">
                    <input type="hidden" name="redirect" value="https://aessa786.github.io/form-complete.html">

                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" name="name" class="form-control" style="width: 200px;" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" name="email" class="form-control" style="width: 200px;" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea name="message" type="text" class="form-control" style="width: 200px; height: 100px;"required></textarea>
                    </div>

                    <button type="submit">Submit</button>
                </form>
                <p id="disclaimer">Powered by Web3Forms — no data stored beyond delivery.</p>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 My Website. All rights reserved.</p>
        </footer>
    </body>

</html>
